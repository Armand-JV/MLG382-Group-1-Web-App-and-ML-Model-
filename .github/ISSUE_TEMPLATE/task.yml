name: ✅ Task
description: Create a smaller actionable task
title: "[Task] <short title>"
labels: ["task"]

body:
  - type: textarea
    id: description
    attributes:
      label: Task Description
      placeholder: Describe the task clearly
    validations:
      required: true

  - type: textarea
    id: checklist
    attributes:
      label: Checklist
      placeholder: |
        - [ ] Step 1
        - [ ] Step 2
        - [ ] Step 3

  - type: dropdown
    id: related_epic
    attributes:
      label: Related Epic
      options:
        - Data Understanding
        - Data Preparation
        - Modeling
        - Segmentation
        - Explainability
        - Dashboard
        - Deployment
        - Documentation

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - High
        - Medium
        - Low
