name: 🐛 Bug Report
description: Report something that is not working correctly
title: "[Bug] <short description>"
labels: ["bug"]

body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      placeholder: Clearly describe what the issue is
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Run script...
        2. Click button...
        3. Error occurs...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should have happened?

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      placeholder: Paste error messages or screenshots here

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical
        - High
        - Medium
        - Low
