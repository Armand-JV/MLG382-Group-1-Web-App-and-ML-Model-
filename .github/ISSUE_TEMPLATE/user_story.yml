name: 📘 User Story
description: Create a structured user story for the project
title: "[User Story] <short title>"
labels: ["user story"]
assignees: []

body:
  - type: input
    id: feature
    attributes:
      label: Feature / Task Name
      placeholder: e.g. Train Random Forest Model
    validations:
      required: true

  - type: textarea
    id: user_story
    attributes:
      label: User Story
      description: Use the format "As a..., I want..., so that..."
      placeholder: As a data scientist, I want to train a model so that I can predict diabetes risk.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - Model is trained
        - Metrics are calculated
        - Results are saved
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: Tasks Checklist
      placeholder: |
        - [ ] Load dataset
        - [ ] Train model
        - [ ] Evaluate results
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - High
        - Medium
        - Low

  - type: dropdown
    id: epic
    attributes:
      label: Epic
      options:
        - Business Understanding
        - Data Preparation
        - Modeling
        - Segmentation
        - Explainability
        - Dashboard
        - Deployment
        - Documentation

  - type: input
    id: deadline
    attributes:
      label: Deadline
      placeholder: YYYY-MM-DD
